<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign In — Ask the Guru</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #faf7f2;
  --surface: #ffffff;
  --border: #e8e0d4;
  --text: #2c2416;
  --muted: #8c7b6b;
  --accent: #b5732a;
  --gold: #c9a84c;
  --radius: 16px;
  --shadow: 0 8px 40px rgba(44,36,22,0.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Jost', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}

body::before {
  content: '';
  position: fixed;
  top: -150px; right: -150px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(201,168,76,0.1) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed;
  bottom: -150px; left: -150px;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(181,115,42,0.07) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 3rem 2.5rem;
  max-width: 420px;
  width: 100%;
  text-align: center;
  position: relative;
  z-index: 1;
}

.guru-image-wrap {
  position: relative;
  display: inline-block;
  margin-bottom: 1.5rem;
}
.guru-image-wrap::before {
  content: '';
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  background: conic-gradient(from 0deg, var(--gold), var(--accent), var(--gold), #7a4f2d, var(--gold));
  animation: spin 12s linear infinite;
  opacity: 0.45;
}
@keyframes spin { to { transform: rotate(360deg); } }

.guru-img {
  position: relative;
  width: 90px; height: 90px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid var(--bg);
  display: block;
}

h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.2rem;
  font-weight: 300;
  color: var(--text);
  margin-bottom: 0.4rem;
}
.tagline {
  font-size: 0.8rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 2.5rem;
}

.divider {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 2rem;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
}
.divider span { color: var(--gold); font-size: 1rem; }

.signin-text {
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 1.25rem;
}

/* Google button */
.btn-google {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
  width: 100%;
  padding: 0.9rem 1.5rem;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-family: 'Jost', sans-serif;
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  text-decoration: none;
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.1s;
}
.btn-google:hover {
  border-color: var(--gold);
  box-shadow: 0 4px 16px rgba(201,168,76,0.15);
  transform: translateY(-1px);
}
.btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }

.footer-note {
  margin-top: 2rem;
  font-size: 0.72rem;
  color: var(--muted);
  line-height: 1.6;
}

.om {
  font-size: 1.5rem;
  color: var(--gold);
  margin-top: 1.5rem;
  display: block;
}
</style>
</head>
<body>
<div class="card">
  {% load static %}
  <div class="guru-image-wrap">
    <img class="guru-img" src="{% static 'guru/images/image1.webp' %}" alt="Guru"
         onerror="this.style.display='none'"/>
  </div>

  <h1>Ask the Guru</h1>
  <p class="tagline">Advaita Vedanta · Self-Knowledge</p>

  <div class="divider"><span>✦</span></div>

  <p class="signin-text">Sign in to begin your inquiry</p>

  {% load socialaccount %}
  <a class="btn-google" href="{% provider_login_url 'google' %}">
    <!-- Google G logo SVG -->
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </a>

  <p class="footer-note">
    Your questions and answers are private to your session.<br/>
    We do not store your conversations permanently.
  </p>

  <span class="om">ॐ</span>
</div>
</body>
</html>
